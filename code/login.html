<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirFlow — Sign In</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #07090f;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 24px 20px;
        }

        /* background glow */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(79, 142, 247, 0.13) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Outer wrapper ── */
        .auth-wrapper {
            width: min(440px, 100%);
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .logo h1 {
            font-size: 27px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(130deg, #6aadff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 12px;
            color: #3b4f68;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ── Card ── */
        .card {
            background: #0d1421;
            border: 1px solid #1c2a3e;
            border-radius: 22px;
            padding: 36px 32px 28px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(79, 142, 247, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Panel system (login / signup) ── */
        .panel {
            display: none;
            flex-direction: column;
            gap: 0;
        }

        .panel.active {
            display: flex;
        }

        /* ── Animated slide ── */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel.active {
            animation: slideIn 0.28s ease;
        }

        /* ── Panel header ── */
        .panel-header {
            margin-bottom: 26px;
        }

        .panel-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 13px;
            color: #3d5270;
        }

        /* ── Input group ── */
        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #6b83a0;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #253447;
            width: 15px;
            height: 15px;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 12px 13px 12px 38px;
            border: 1px solid #1c2a3e;
            border-radius: 10px;
            background: #091019;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input::placeholder {
            color: #253447;
        }

        .input-group input:focus {
            border-color: #3b6fd4;
            box-shadow: 0 0 0 3px rgba(59, 111, 212, 0.12);
        }

        /* name row */
        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* ── Forgot ── */
        .forgot {
            text-align: right;
            margin-top: -6px;
            margin-bottom: 18px;
        }

        .forgot a {
            color: #3d5882;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot a:hover {
            color: #6aadff;
        }

        /* ── Primary button ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(130deg, #3b6fd4, #7c5cbf);
            color: #fff;
            font-size: 14.5px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
            margin-bottom: 0;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Divider ── */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 18px;
        }

        .or-divider span {
            flex: 1;
            height: 1px;
            background: #141f2e;
        }

        .or-divider em {
            font-style: normal;
            font-size: 11px;
            color: #253447;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        /* ── Create account / back button ── */
        .btn-create {
            width: 100%;
            padding: 12px;
            border: 1px solid #1e3050;
            border-radius: 10px;
            background: transparent;
            color: #5a8fd4;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-create:hover {
            background: #0d1a2e;
            border-color: #3b6fd4;
            color: #7ab0f5;
        }

        /* ── Message ── */
        .message {
            min-height: 18px;
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
        }

        /* ── Back link ── */
        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #253447;
        }

        .back-link button {
            background: none;
            border: none;
            color: #5a8fd4;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .back-link button:hover {
            color: #6aadff;
        }

        /* ── Footer ── */
        .page-footer {
            text-align: center;
            margin-top: 20px;
        }

        .page-footer a {
            color: #253447;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .page-footer a:hover {
            color: #6aadff;
        }

        /* ── Responsive ── */
        @media (max-width: 400px) {
            .card {
                padding: 28px 18px 22px;
            }

            .name-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-mark">
                <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 22L18 6L30 22H22L18 30L14 22H6Z" fill="url(#g1)" opacity="0.9" />
                    <defs>
                        <linearGradient id="g1" x1="6" y1="6" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6aadff" />
                            <stop offset="1" stop-color="#a78bfa" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>AirFlow</h1>
            </div>
            <p>Flight Booking</p>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- ══ LOGIN PANEL ══ -->
            <div class="panel active" id="loginPanel">

                <div class="panel-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to manage your bookings</p>
                </div>

                <div class="input-group">
                    <label>Email address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="loginPassword" placeholder="Enter your password"
                            autocomplete="current-password">
                    </div>
                </div>

                <div class="forgot"><a href="#">Forgot password?</a></div>

                <button class="btn-primary" id="loginBtn" type="button" onclick="loginUser()">Sign in</button>
                <div id="loginMessage" class="message"></div>

                <div class="or-divider"><span></span><em>NEW USER?</em><span></span></div>

                <button class="btn-create" type="button" onclick="showPanel('signup')">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Create new account
                </button>

            </div><!-- /loginPanel -->

            <!-- ══ SIGNUP PANEL ══ -->
            <div class="panel" id="signupPanel">

                <div class="panel-header">
                    <h2>Create an account</h2>
                    <p>Book flights in minutes — it's free</p>
                </div>

                <div class="name-row">
                    <div class="input-group">
                        <label>First name</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                            </svg>
                            <input type="text" id="signupFirst" placeholder="First" autocomplete="given-name">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Last name</label>
                        <div class="input-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                            </svg>
                            <input type="text" id="signupLast" placeholder="Last" autocomplete="family-name">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email address</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="signupPassword" placeholder="Create a password"
                            autocomplete="new-password">
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                        <input type="password" id="signupConfirm" placeholder="Repeat password"
                            autocomplete="new-password">
                    </div>
                </div>

                <button class="btn-primary" id="signupBtn" type="button" onclick="registerUser()">Create
                    account</button>
                <div id="signupMessage" class="message"></div>

                <div class="back-link">
                    Already have an account? <button type="button" onclick="showPanel('login')">Sign in</button>
                </div>

            </div><!-- /signupPanel -->

        </div><!-- /card -->

        <div class="page-footer">
            <a href="AIRLINE.html">← Back to home</a>
        </div>

    </div><!-- /auth-wrapper -->

    <script>
        const API_BASE = window.location.protocol === 'file:'
            ? 'http://127.0.0.1:5000/api'
            : window.location.origin + '/api';

        const HOME_URL = window.location.protocol === 'file:'
            ? 'AIRLINE.html'
            : window.location.origin + '/#';

        /* ── Panel switcher ── */
        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(name + 'Panel').classList.add('active');
            // clear messages
            document.getElementById('loginMessage').textContent = '';
            document.getElementById('signupMessage').textContent = '';
        }

        /* ── Loading state ── */
        function setLoading(btn, loading, label) {
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait…' : label;
        }

        /* ── Login ── */
        async function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const msg = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                msg.innerHTML = '<span style="color:#f87171">Please enter your email and password.</span>';
                return;
            }

            setLoading(btn, true, 'Sign in');

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    msg.innerHTML = '<span style="color:#4ade80">Signed in! Redirecting…</span>';
                    setTimeout(() => { window.location.href = HOME_URL; }, 1000);
                } else {
                    msg.innerHTML = `<span style="color:#f87171">${data.message || 'Incorrect email or password.'}</span>`;
                    setLoading(btn, false, 'Sign in');
                }
            } catch {
                msg.innerHTML = '<span style="color:#f87171">Cannot reach server. Try again shortly.</span>';
                setLoading(btn, false, 'Sign in');
            }
        }

        /* ── Register ── */
        async function registerUser() {
            const first = document.getElementById('signupFirst').value.trim();
            const last = document.getElementById('signupLast').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirm = document.getElementById('signupConfirm').value.trim();
            const msg = document.getElementById('signupMessage');
            const btn = document.getElementById('signupBtn');

            if (!first || !last || !email || !password || !confirm) {
                msg.innerHTML = '<span style="color:#f87171">All fields are required.</span>';
                return;
            }
            if (password !== confirm) {
                msg.innerHTML = '<span style="color:#f87171">Passwords do not match.</span>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<span style="color:#f87171">Password must be at least 6 characters.</span>';
                return;
            }

            setLoading(btn, true, 'Create account');

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name: `${first} ${last}`, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    msg.innerHTML = '<span style="color:#4ade80">Account created! Redirecting…</span>';
                    setTimeout(() => { window.location.href = HOME_URL; }, 1000);
                } else {
                    msg.innerHTML = `<span style="color:#f87171">${data.message || 'Registration failed.'}</span>`;
                    setLoading(btn, false, 'Create account');
                }
            } catch {
                msg.innerHTML = '<span style="color:#f87171">Cannot reach server. Try again shortly.</span>';
                setLoading(btn, false, 'Create account');
            }
        }

        /* ── Enter key on login ── */
        ['loginEmail', 'loginPassword'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if (e.key === 'Enter') loginUser();
            });
        });
    </script>

</body>

</html>
